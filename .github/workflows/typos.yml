name: Check Typos
on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions: {}

jobs:
  run:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Check spelling
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d # master
