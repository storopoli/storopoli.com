name: Build
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Typst
        uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
        with:
          # html export is unstable across versions; pin the exact version
          # the site is developed against
          typst-version: "0.15.0"

      - name: Install Pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1.1.1
        with:
          version: "3.10"

      - name: Build site
        run: ./scripts/build.sh

      - name: Check output sanity
        run: |
          test -f _site/index.html
          test -f _site/atom.xml
          test -f _site/CNAME
          ! grep -rl 'src="data:' _site/posts

      - name: Validate Atom feed is well-formed
        # Each entry embeds full post HTML in <content type="html">, so a
        # malformed body would break the feed's XML — catch it before deploy.
        # xmllint (libxml2-utils) isn't on the runner image, so install it.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-utils
          xmllint --noout _site/atom.xml

      - name: Check internal links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --offline --root-dir "${{ github.workspace }}/_site" --no-progress "_site"
          fail: true

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site/

  deploy:
    permissions:
      contents: read
      id-token: write
      pages: write
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
