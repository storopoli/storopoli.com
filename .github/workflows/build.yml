name: Build
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Install Typst
        uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
        with:
          # html export is unstable across versions; pin the exact version
          # the site is developed against
          typst-version: "0.14.2"

      - name: Cache Typst packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/typst/packages
          key: typst-packages-${{ runner.os }}-${{ hashFiles('lib/template.typ') }}
          restore-keys: typst-packages-${{ runner.os }}-

      - name: Build site
        run: ./scripts/build.sh

      - name: Check output sanity
        run: |
          test -f _site/index.html
          test -f _site/atom.xml
          test -f _site/CNAME
          ! grep -rl 'src="data:' _site/posts

      - name: Check internal links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --offline --root-dir "${{ github.workspace }}/_site" --no-progress "_site"
          fail: true

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v3
        with:
          path: _site/

  deploy:
    permissions:
      contents: read
      id-token: write
      pages: write
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
